<div class="table-responsive shadow-sm rounded border bg-white">
  <table class="table table-sm table-bordered table-striped table-hover align-middle mb-0">
    <thead class="table-primary">
      <tr>
        <th>№</th>
        <th>Слушатель</th>
        <th>Курс</th>
        <th>Категория</th>
        <th>Старт</th>
        <th>Оплата</th>
        <th>Статус</th>
      </tr>
    </thead>
    <tbody>
      {% for app in applications %}
        <tr data-app-row="{{ app.pk }}">
          <td>{{ app.pk }}</td>
          <td>{{ app.user.username }}<br><span class="small text-muted">{{ app.user.email }}</span></td>
          <td>{{ app.course.title }}</td>
          <td>{{ app.course.category.name }}</td>
          <td>{{ app.start_date|date:"d.m.Y" }}</td>
          <td>{{ app.get_payment_method_display }}</td>
          <td>
            <select
              class="form-select form-select-sm js-status-select"
              data-url="{% url 'portal:staff_advance' app.pk %}"
              data-app-id="{{ app.pk }}"
              aria-label="Статус заявки №{{ app.pk }}"
            >
              {% for val, label in status_choices %}
                <option value="{{ val }}" {% if app.status == val %}selected{% endif %}>{{ label }}</option>
              {% endfor %}
            </select>
          </td>
        </tr>
      {% empty %}
        <tr><td colspan="7" class="text-center text-muted py-4">Нет заявок</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
