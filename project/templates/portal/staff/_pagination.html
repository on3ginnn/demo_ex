{% if is_paginated %}
  <nav class="mt-3" aria-label="Страницы">
    <ul class="pagination pagination-sm flex-wrap mb-0">
      {% if page_obj.has_previous %}
        <li class="page-item">
          <a
            class="page-link js-page-link"
            href="?page={{ page_obj.previous_page_number }}{% if filter_query %}&{{ filter_query }}{% endif %}"
            data-page="{{ page_obj.previous_page_number }}"
          >Назад</a>
        </li>
      {% endif %}
      <li class="page-item disabled">
        <span class="page-link">Стр. {{ page_obj.number }} из {{ paginator.num_pages }}</span>
      </li>
      {% if page_obj.has_next %}
        <li class="page-item">
          <a
            class="page-link js-page-link"
            href="?page={{ page_obj.next_page_number }}{% if filter_query %}&{{ filter_query }}{% endif %}"
            data-page="{{ page_obj.next_page_number }}"
          >Вперёд</a>
        </li>
      {% endif %}
    </ul>
  </nav>
{% endif %}
